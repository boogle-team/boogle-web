name: 🐛 Bug Report
description: 버그 / 오류 제보
title: "[FIX] "
labels: ["fix"]
body:
  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 문제가 발생했는지 설명해주세요
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 버그를 재현할 수 있는 순서를 작성해주세요
      placeholder: |
        1. '...' 페이지로 이동
        2. '...' 버튼 클릭
        3. 오류 발생 확인
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 원래 어떻게 동작해야 하는지 작성해주세요
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: 스크린샷 / 영상
      description: 오류 화면을 첨부해주세요 (선택)
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: 발생 환경
      multiple: true
      options:
        - Chrome
        - Safari
        - Android
        - iOS
        - 기타
    validations:
      required: false

  - type: textarea
    id: etc
    attributes:
      label: 기타
      description: 그 외 공유하고 싶은 내용
    validations:
      required: false
